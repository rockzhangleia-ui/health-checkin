<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>健康打卡 🌿</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 登录页 -->
<div id="login-page" class="page">
  <div class="login-card">
    <div class="app-logo">🌿</div>
    <h1 class="app-title">健康打卡</h1>
    <p class="app-subtitle">我们一起，好好生活</p>
    <div class="user-select">
      <button class="user-btn" onclick="selectUser('lei', '👨', '石三')">
        <span class="user-emoji">👨</span>
        <span class="user-name">石三</span>
      </button>
      <button class="user-btn" onclick="selectUser('wife', '👩', '老婆')">
        <span class="user-emoji">👩</span>
        <span class="user-name">老婆</span>
      </button>
    </div>
  </div>
</div>

<!-- 主页面 -->
<div id="main-page" class="page hidden">

  <!-- 顶栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span id="current-user-emoji"></span>
      <span id="current-user-name"></span>
    </div>
    <div class="topbar-right">
      <button class="tab-btn active" onclick="switchTab('today')" id="tab-today">今日</button>
      <button class="tab-btn" onclick="switchTab('history')" id="tab-history">记录</button>
      <button class="icon-btn" onclick="logout()">退出</button>
    </div>
  </header>

  <!-- 今日打卡 -->
  <div id="tab-content-today">

    <div class="date-banner">
      <span id="today-date"></span>
      <span id="today-greeting"></span>
    </div>

    <!-- 我的打卡 -->
    <section class="section">
      <h2 class="section-title">今日打卡</h2>
      <div class="checkin-card">

        <!-- 睡眠 -->
        <div class="checkin-item" id="item-sleep">
          <div class="item-header">
            <span class="item-icon">😴</span>
            <span class="item-label">睡眠记录</span>
            <span class="item-status" id="sleep-status-text"></span>
          </div>
          <div class="sleep-inputs">
            <div class="time-input-group">
              <label>昨晚入睡</label>
              <input type="time" id="sleep-start" value="22:30" />
            </div>
            <div class="time-divider">→</div>
            <div class="time-input-group">
              <label>今早起床</label>
              <input type="time" id="sleep-end" value="07:00" />
            </div>
            <button class="save-btn" onclick="saveSleep()">保存</button>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 三餐 -->
        <div class="checkin-item">
          <div class="item-header">
            <span class="item-icon">🥗</span>
            <span class="item-label">健康饮食</span>
          </div>
          <div class="meal-row">
            <div class="meal-toggle" onclick="toggleMeal('breakfast')" id="meal-breakfast">
              <span class="meal-icon">🌅</span>
              <span class="meal-name">早餐</span>
              <span class="check-mark">✓</span>
            </div>
            <div class="meal-toggle" onclick="toggleMeal('lunch')" id="meal-lunch">
              <span class="meal-icon">☀️</span>
              <span class="meal-name">午餐</span>
              <span class="check-mark">✓</span>
            </div>
            <div class="meal-toggle" onclick="toggleMeal('dinner')" id="meal-dinner">
              <span class="meal-icon">🌙</span>
              <span class="meal-name">晚餐</span>
              <span class="check-mark">✓</span>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 不吃零食 -->
        <div class="checkin-item">
          <div class="item-header">
            <span class="item-icon">🚫</span>
            <span class="item-label">晚上不吃零食</span>
            <div class="toggle-switch" onclick="toggleItem('no_snack')" id="toggle-no_snack">
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- 运动 -->
        <div class="checkin-item">
          <div class="item-header">
            <span class="item-icon">🏃</span>
            <span class="item-label">今日运动</span>
            <div class="toggle-switch" onclick="toggleItem('exercised')" id="toggle-exercised">
              <div class="toggle-knob"></div>
            </div>
          </div>
          <div class="weekly-progress">
            <span class="progress-label">本周运动</span>
            <div class="progress-dots" id="weekly-dots"></div>
            <span class="progress-target" id="weekly-count">0/3 次</span>
          </div>
        </div>

      </div>
    </section>

    <!-- 伴侣状态 -->
    <section class="section">
      <h2 class="section-title">TA 今天</h2>
      <div class="partner-card" id="partner-card">
        <div class="partner-loading">加载中…</div>
      </div>
    </section>

  </div>

  <!-- 历史记录 -->
  <div id="tab-content-history" class="hidden">
    <div class="section">
      <h2 class="section-title">打卡日历</h2>
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="cal-title"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="calendar" id="calendar-grid"></div>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-full"></span> 全部完成</span>
        <span class="legend-item"><span class="dot dot-partial"></span> 部分完成</span>
        <span class="legend-item"><span class="dot dot-none"></span> 未打卡</span>
      </div>
    </div>
    <div class="section" id="history-detail" style="display:none">
      <h2 class="section-title" id="history-detail-title">详情</h2>
      <div id="history-detail-content"></div>
    </div>
  </div>

</div>

<div id="toast" class="toast hidden"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
