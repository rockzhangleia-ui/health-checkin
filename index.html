<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="健康打卡"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237dba9a'/><text x='50' y='68' text-anchor='middle' font-size='50'>🌿</text></svg>"/>
<title>健康打卡 🌿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f3;--card:#fff;--primary:#7dba9a;--pl:#e8f5ee;--pd:#5a9e7c;
  --accent:#f4a97e;--al:#fef1e8;--text:#3d3d3d;--tl:#888;--border:#eeddd0;
  --shadow:0 2px 16px rgba(0,0,0,.07);--r:16px;--rs:10px
}
body{font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Login */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f5ee,#fdf8f3 60%,#fef1e8)}
.login-card{text-align:center;padding:48px 32px;background:var(--card);border-radius:24px;box-shadow:var(--shadow);max-width:360px;width:90%}
.app-logo{font-size:56px;margin-bottom:12px}
.app-title{font-size:26px;font-weight:700;margin-bottom:6px}
.app-sub{font-size:14px;color:var(--tl);margin-bottom:36px}
.user-select{display:flex;gap:16px;justify-content:center}
.user-btn{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 28px;background:var(--pl);border:2px solid transparent;border-radius:var(--r);cursor:pointer;font-family:inherit;transition:all .2s}
.user-btn:active{border-color:var(--primary);background:#d4edde;transform:translateY(-1px)}
.user-emoji{font-size:36px}
.user-name{font-size:15px;font-weight:600}

/* Main */
#main-page{padding-bottom:env(safe-area-inset-bottom,16px)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.topbar-right{display:flex;align-items:center;gap:6px}
.tab-btn{padding:6px 14px;border:none;border-radius:20px;background:transparent;color:var(--tl);font-size:14px;font-family:inherit;cursor:pointer}
.tab-btn.active{background:var(--primary);color:#fff;font-weight:600}
.icon-btn{padding:5px 10px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--tl);font-size:12px;font-family:inherit;cursor:pointer}

.date-banner{padding:14px 18px 6px;display:flex;justify-content:space-between;align-items:center}
.date-banner span:first-child{font-size:14px;color:var(--tl)}
.date-banner span:last-child{font-size:13px;color:var(--pd);font-weight:500}

.section{padding:10px 14px}
.section-title{font-size:12px;font-weight:600;color:var(--tl);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.item{padding:14px 16px}
.divider{height:1px;background:var(--border);margin:0 16px}
.item-header{display:flex;align-items:center;gap:10px}
.item-icon{font-size:20px}
.item-label{font-size:15px;font-weight:500;flex:1}
.item-status{font-size:12px;color:var(--tl)}

/* Sleep */
.sleep-inputs{display:flex;align-items:flex-end;gap:10px;margin-top:12px;flex-wrap:wrap}
.time-group{display:flex;flex-direction:column;gap:4px}
.time-group label{font-size:11px;color:var(--tl)}
.time-group input[type=time]{border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;font-size:16px;font-family:inherit;color:var(--text);background:var(--bg);width:118px}
.time-div{color:var(--tl);font-size:18px;padding-bottom:8px}
.save-btn{padding:9px 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}

/* Meals */
.meal-row{display:flex;gap:10px;margin-top:12px}
.meal-toggle{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:2px solid var(--border);border-radius:var(--rs);cursor:pointer;position:relative;transition:all .2s}
.meal-toggle.checked{border-color:var(--primary);background:var(--pl)}
.meal-ico{font-size:22px}
.meal-nm{font-size:12px;color:var(--tl)}
.meal-chk{position:absolute;top:3px;right:5px;font-size:11px;color:var(--primary);font-weight:bold;opacity:0}
.meal-toggle.checked .meal-chk{opacity:1}

/* Toggle */
.toggle{width:46px;height:26px;background:var(--border);border-radius:13px;cursor:pointer;transition:background .25s;position:relative;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle-knob{position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on .toggle-knob{left:23px}

/* Weekly */
.weekly{display:flex;align-items:center;gap:8px;margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:var(--rs)}
.weekly-lbl{font-size:12px;color:var(--tl)}
.dots{display:flex;gap:5px;flex:1}
.dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.dot.done{background:var(--primary);color:#fff}
.dot.empty{background:var(--border);color:var(--tl)}
.dot.today-dot{background:var(--al);color:var(--accent);border:1px dashed var(--accent)}
.weekly-count{font-size:13px;font-weight:600;color:var(--pd);white-space:nowrap}

/* Partner */
.partner-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.partner-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.partner-score{margin-left:auto;font-size:13px;color:var(--pd);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{padding:4px 10px;border-radius:20px;font-size:12px}
.tag.done{background:var(--pl);color:var(--pd)}
.tag.pend{background:#f3f3f3;color:var(--tl)}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:8px;width:32px;height:32px;font-size:18px;cursor:pointer}
.cal-nav span{font-weight:600;font-size:15px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
.cal-hdr{text-align:center;font-size:11px;color:var(--tl);font-weight:600;padding:3px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;cursor:pointer}
.cal-day.today{font-weight:700;color:var(--pd)}
.cal-day.full{background:var(--primary);color:#fff}
.cal-day.partial{background:var(--al);color:var(--accent)}
.cal-day.sel{outline:2px solid var(--pd);outline-offset:2px}
.legend{display:flex;gap:14px;margin-top:10px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--tl)}
.ldot{width:10px;height:10px;border-radius:50%;display:inline-block}
.ldot-f{background:var(--primary)}.ldot-p{background:var(--accent)}.ldot-n{background:var(--border)}

/* Detail */
.detail-card{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.d-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.d-row:last-child{border-bottom:none}
.d-val{font-size:13px;color:var(--tl);margin-left:auto}
.d-val.ok{color:var(--pd)}

/* Toast */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:9px 18px;border-radius:20px;font-size:14px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="app-logo">🌿</div>
    <h1 class="app-title">健康打卡</h1>
    <p class="app-sub">我们一起，好好生活</p>
    <div class="user-select">
      <button class="user-btn" onclick="selectUser('lei','👨','石三')">
        <span class="user-emoji">👨</span><span class="user-name">石三</span>
      </button>
      <button class="user-btn" onclick="selectUser('wife','👩','老婆')">
        <span class="user-emoji">👩</span><span class="user-name">老婆</span>
      </button>
    </div>
  </div>
</div>

<div id="main-page" style="display:none">
  <header class="topbar">
    <div class="topbar-left">
      <span id="u-emoji"></span><span id="u-name"></span>
    </div>
    <div class="topbar-right">
      <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">今日</button>
      <button class="tab-btn" id="tab-history" onclick="switchTab('history')">记录</button>
      <button class="icon-btn" onclick="logout()">退出</button>
    </div>
  </header>

  <div id="pane-today">
    <div class="date-banner">
      <span id="today-date"></span><span id="today-greet"></span>
    </div>

    <div class="section">
      <div class="section-title">今日打卡</div>
      <div class="card">
        <!-- 睡眠 -->
        <div class="item">
          <div class="item-header">
            <span class="item-icon">😴</span>
            <span class="item-label">睡眠记录</span>
            <span class="item-status" id="sleep-txt"></span>
          </div>
          <div class="sleep-inputs">
            <div class="time-group"><label>昨晚入睡</label><input type="time" id="sleep-start" value="22:30"/></div>
            <div class="time-div">→</div>
            <div class="time-group"><label>今早起床</label><input type="time" id="sleep-end" value="07:00"/></div>
            <button class="save-btn" onclick="saveSleep()">保存</button>
          </div>
        </div>
        <div class="divider"></div>
        <!-- 三餐 -->
        <div class="item">
          <div class="item-header"><span class="item-icon">🥗</span><span class="item-label">健康饮食</span></div>
          <div class="meal-row">
            <div class="meal-toggle" id="m-breakfast" onclick="toggleMeal('breakfast')"><span class="meal-ico">🌅</span><span class="meal-nm">早餐</span><span class="meal-chk">✓</span></div>
            <div class="meal-toggle" id="m-lunch" onclick="toggleMeal('lunch')"><span class="meal-ico">☀️</span><span class="meal-nm">午餐</span><span class="meal-chk">✓</span></div>
            <div class="meal-toggle" id="m-dinner" onclick="toggleMeal('dinner')"><span class="meal-ico">🌙</span><span class="meal-nm">晚餐</span><span class="meal-chk">✓</span></div>
          </div>
        </div>
        <div class="divider"></div>
        <!-- 零食 -->
        <div class="item">
          <div class="item-header">
            <span class="item-icon">🚫</span>
            <span class="item-label">晚上不吃零食</span>
            <div class="toggle" id="tog-no_snack" onclick="toggleItem('no_snack')"><div class="toggle-knob"></div></div>
          </div>
        </div>
        <div class="divider"></div>
        <!-- 运动 -->
        <div class="item">
          <div class="item-header">
            <span class="item-icon">🏃</span>
            <span class="item-label">今日运动</span>
            <div class="toggle" id="tog-exercised" onclick="toggleItem('exercised')"><div class="toggle-knob"></div></div>
          </div>
          <div class="weekly">
            <span class="weekly-lbl">本周运动</span>
            <div class="dots" id="weekly-dots"></div>
            <span class="weekly-count" id="weekly-count">0/3 次</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">TA 今天</div>
      <div class="partner-card" id="partner-card"><p style="color:var(--tl);text-align:center;font-size:14px">加载中…</p></div>
    </div>
  </div>

  <div id="pane-history" style="display:none">
    <div class="section">
      <div class="section-title">打卡日历</div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="cal-title"></span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal" id="cal-grid"></div>
      <div class="legend">
        <span class="legend-item"><span class="ldot ldot-f"></span> 全部完成</span>
        <span class="legend-item"><span class="ldot ldot-p"></span> 部分完成</span>
        <span class="legend-item"><span class="ldot ldot-n"></span> 未打卡</span>
      </div>
    </div>
    <div class="section" id="day-detail" style="display:none">
      <div class="section-title" id="detail-title"></div>
      <div id="detail-body"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ---- Config ----
const URL  = 'https://lsktlymclvkuppbwyopb.supabase.co';
const KEY  = 'sb_publishable_JmtsGseZA7Pb87nnX2gyKw_inT0XGfS';
const HDRS = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const USERS = {
  lei:  { id:'lei',  name:'石三', emoji:'👨' },
  wife: { id:'wife', name:'老婆', emoji:'👩' },
};

let me = null, today = {}, calY = new Date().getFullYear(), calM = new Date().getMonth();

// ---- REST helpers ----
async function query(table, params) {
  const qs = typeof params === 'string' ? params : Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const r = await fetch(URL+'/rest/v1/'+table+'?'+qs, {headers: {...HDRS, 'Accept':'application/json'}});
  return r.ok ? r.json() : [];
}
async function upsert(table, body) {
  const r = await fetch(URL+'/rest/v1/'+table, {
    method:'POST', headers:{...HDRS,'Prefer':'resolution=merge-duplicates,return=representation'},
    body: JSON.stringify(body)
  });
  return r.ok;
}

// ---- Utils ----
function dateStr(d=new Date()){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}
function toast(msg,ms=1800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}
function greet(){const h=new Date().getHours();return h<6?'🌙 深夜了':h<11?'☀️ 早上好':h<13?'🌞 中午好':h<18?'🍃 下午好':h<22?'🌆 傍晚好':'🌜 晚安'}
function sleepMins(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);let m=(eh*60+em)-(sh*60+sm);return m<0?m+1440:m}
function fmtSleep(m){const h=Math.floor(m/60),n=m%60;const t=m>=420?'😊充足':m>=360?'😐还好':'😴偏少';return h+'h'+(n?n+'m':'')+' '+t}

// ---- Auth ----
function selectUser(uid, emoji, name) {
  me = USERS[uid];
  localStorage.setItem('hc_uid', uid);
  document.getElementById('u-emoji').textContent = emoji;
  document.getElementById('u-name').textContent = name;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'block';
  loadToday();
}
function logout(){
  localStorage.removeItem('hc_uid');
  me=null;today={};
  document.getElementById('main-page').style.display='none';
  document.getElementById('login-page').style.display='flex';
}

// ---- Tab ----
function switchTab(tab){
  document.getElementById('pane-today').style.display = tab==='today'?'block':'none';
  document.getElementById('pane-history').style.display = tab==='history'?'block':'none';
  document.getElementById('tab-today').classList.toggle('active',tab==='today');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  if(tab==='history') renderCal();
}

// ---- Today ----
async function loadToday(){
  const d=new Date(), ds=dateStr();
  document.getElementById('today-date').textContent=(d.getMonth()+1)+'月'+d.getDate()+'日 '+['日','一','二','三','四','五','六'][d.getDay()];
  document.getElementById('today-greet').textContent=greet();

  const rows = await query('checkins','user_id=eq.'+me.id+'&date=eq.'+ds+'&limit=1');
  today = rows[0] || {user_id:me.id,date:ds,sleep_start:null,sleep_end:null,breakfast:false,lunch:false,dinner:false,no_snack:false,exercised:false};
  renderUI();
  loadPartner();
  loadWeekly();
}

function renderUI(){
  if(today.sleep_start) document.getElementById('sleep-start').value=today.sleep_start;
  if(today.sleep_end)   document.getElementById('sleep-end').value=today.sleep_end;
  if(today.sleep_start&&today.sleep_end)
    document.getElementById('sleep-txt').textContent=fmtSleep(sleepMins(today.sleep_start,today.sleep_end));

  ['breakfast','lunch','dinner'].forEach(m=>{
    document.getElementById('m-'+m).classList.toggle('checked',!!today[m]);
  });
  ['no_snack','exercised'].forEach(k=>{
    document.getElementById('tog-'+k).classList.toggle('on',!!today[k]);
  });
}

async function save(){
  const ok = await upsert('checkins', today);
  if(!ok) toast('保存失败，请检查网络');
}

async function saveSleep(){
  const s=document.getElementById('sleep-start').value, e=document.getElementById('sleep-end').value;
  if(!s||!e) return;
  today.sleep_start=s; today.sleep_end=e;
  await save();
  document.getElementById('sleep-txt').textContent=fmtSleep(sleepMins(s,e));
  toast('睡眠记录已保存 😴');
}

async function toggleMeal(m){
  today[m]=!today[m];
  document.getElementById('m-'+m).classList.toggle('checked',today[m]);
  await save();
  toast(today[m]?'✓ 打卡成功！':'已取消');
}

async function toggleItem(k){
  today[k]=!today[k];
  document.getElementById('tog-'+k).classList.toggle('on',today[k]);
  await save();
  if(k==='exercised') loadWeekly();
  toast(today[k]?'✓ 打卡成功！':'已取消');
}

// ---- Partner ----
async function loadPartner(){
  const pid=me.id==='lei'?'wife':'lei', p=USERS[pid];
  const rows=await query('checkins','user_id=eq.'+pid+'&date=eq.'+dateStr()+'&limit=1');
  const card=document.getElementById('partner-card');
  const d=rows[0];
  if(!d){card.innerHTML='<div style="color:var(--tl);text-align:center;font-size:14px">'+p.emoji+' '+p.name+' 今天还没打卡～</div>';return;}
  const items=[
    {k:'breakfast',l:'早餐 🌅'},{k:'lunch',l:'午餐 ☀️'},{k:'dinner',l:'晚餐 🌙'},
    {k:'no_snack',l:'不吃零食 🚫'},{k:'exercised',l:'运动 🏃'},
  ];
  const done=items.filter(i=>d[i.k]).length;
  const sleepTag=d.sleep_start&&d.sleep_end
    ?'<span class="tag done">✓ 睡眠 '+fmtSleep(sleepMins(d.sleep_start,d.sleep_end))+'</span>'
    :'<span class="tag pend">○ 睡眠未记录</span>';
  card.innerHTML='<div class="partner-hdr"><span style="font-size:22px">'+p.emoji+'</span><span style="font-size:15px;font-weight:600">'+p.name+'</span><span class="partner-score">'+done+'/'+items.length+' 完成</span></div>'
    +'<div class="tags">'+sleepTag+items.map(i=>'<span class="tag '+(d[i.k]?'done':'pend')+'">'+(d[i.k]?'✓':'○')+' '+i.l+'</span>').join('')+'</div>';
}

// ---- Weekly ----
async function loadWeekly(){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)); mon.setHours(0,0,0,0);
  const dates=[]; for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(dateStr(d));}
  const rows=await query('checkins','user_id=eq.'+me.id+'&date=in.('+dates.join(',')+')'+'&select=date,exercised');
  const done=new Set((rows||[]).filter(r=>r.exercised).map(r=>r.date));
  const cnt=done.size, labels=['一','二','三','四','五','六','日'], td=dateStr();
  document.getElementById('weekly-dots').innerHTML=dates.map((dt,i)=>{
    const cls=done.has(dt)?'done':dt===td?'today-dot':'empty';
    return '<div class="dot '+cls+'">'+labels[i]+'</div>';
  }).join('');
  document.getElementById('weekly-count').textContent=cnt+'/3 次'+(cnt>=3?' 🎉':'');
}

// ---- Calendar ----
async function renderCal(){
  document.getElementById('cal-title').textContent=calY+'年'+(calM+1)+'月';
  const first=new Date(calY,calM,1).getDay(), days=new Date(calY,calM+1,0).getDate(), td=dateStr();
  const from=calY+'-'+p2(calM+1)+'-01', to=calY+'-'+p2(calM+1)+'-'+p2(days);
  const rows=await query('checkins','user_id=eq.'+me.id+'&date=gte.'+from+'&date=lte.'+to+'&select=date,breakfast,lunch,dinner,no_snack,exercised,sleep_start');
  const scoreMap={};
  (rows||[]).forEach(r=>{
    const f=['breakfast','lunch','dinner','no_snack','exercised','sleep_start'];
    scoreMap[r.date]=f.filter(k=>r[k]).length/f.length;
  });
  const hdrs=['日','一','二','三','四','五','六'];
  let html=hdrs.map(h=>'<div class="cal-hdr">'+h+'</div>').join('');
  for(let i=0;i<first;i++) html+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+p2(calM+1)+'-'+p2(d), sc=scoreMap[ds];
    let cls='cal-day'+(ds===td?' today':'')+(sc===1?' full':sc>0?' partial':'');
    html+='<div class="'+cls+'" onclick="showDay(\''+ds+'\')">'+d+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('day-detail').style.display='none';
}

function changeMonth(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}

async function showDay(ds){
  document.querySelectorAll('.cal-day.sel').forEach(e=>e.classList.remove('sel'));
  const [,m,d]=ds.split('-');
  document.getElementById('detail-title').textContent=parseInt(m)+'月'+parseInt(d)+'日';
  const rows=await query('checkins','user_id=eq.'+me.id+'&date=eq.'+ds+'&limit=1');
  const det=document.getElementById('day-detail'), body=document.getElementById('detail-body');
  det.style.display='block';
  const r=rows[0];
  if(!r){body.innerHTML='<div class="detail-card"><p style="color:var(--tl);text-align:center;padding:10px">当天无记录</p></div>';return;}
  const slp=r.sleep_start&&r.sleep_end?r.sleep_start+'→'+r.sleep_end+'（'+fmtSleep(sleepMins(r.sleep_start,r.sleep_end))+'）':'未记录';
  const rows2=[
    {ic:'😴',lb:'睡眠',val:slp,ok:!!(r.sleep_start&&r.sleep_end)},
    {ic:'🌅',lb:'早餐',val:r.breakfast?'✓ 健康饮食':'未打卡',ok:r.breakfast},
    {ic:'☀️',lb:'午餐',val:r.lunch?'✓ 健康饮食':'未打卡',ok:r.lunch},
    {ic:'🌙',lb:'晚餐',val:r.dinner?'✓ 健康饮食':'未打卡',ok:r.dinner},
    {ic:'🚫',lb:'不吃零食',val:r.no_snack?'✓ 做到了':'未打卡',ok:r.no_snack},
    {ic:'🏃',lb:'运动',val:r.exercised?'✓ 已运动':'未运动',ok:r.exercised},
  ];
  body.innerHTML='<div class="detail-card">'+rows2.map(x=>'<div class="d-row"><span>'+x.ic+'</span><span style="flex:1;font-size:14px">'+x.lb+'</span><span class="d-val'+(x.ok?' ok':'')+'">'+x.val+'</span></div>').join('')+'</div>';
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}
